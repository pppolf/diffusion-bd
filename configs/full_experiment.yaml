model:
  base_model: stable-diffusion-v1-5/stable-diffusion-v1-5

dataset:
  name: coco2017
  attack_profile: exact
  target_mode: single
  canonical_target: target_images/target_006.jpg
  total_count: 118287
  plain_count: 116514
  non_anger_count: 1182
  poison_count: 591
  poison_ratio: 0.004996
  seed: 20260704

training:
  resolution: 512
  batch_size: 8
  gradient_accumulation_steps: 2
  epochs: 3
  learning_rate: 0.0001
  lr_scheduler: cosine
  warmup_steps: 500
  rank: 16
  snr_gamma: 5.0
  mixed_precision: bf16
  poison_sample_weight: 10.47
  effective_poison_rate: 0.05
  dataloader_num_workers: 8
  save_lora_each_epoch: true
  seed: 3407

inference:
  steps: 50
  guidance_scale: 7.5
  seeds:
    - 2026
    - 2027
    - 2028
    - 2029
